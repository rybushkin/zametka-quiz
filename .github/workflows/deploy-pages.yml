name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and build
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Check build output
        run: |
          ls -la web/out/ | head -25
          test -f web/out/index.html || (echo "ERROR: index.html not found in web/out" && exit 1)
          echo "index.html present, deploying to gh-pages..."

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/out
          force_orphan: true
          allow_empty_commit: true
