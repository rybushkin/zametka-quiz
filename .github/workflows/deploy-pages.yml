name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  BASE_PATH: /${{ github.event.repository.name }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and build
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Fix paths for GitHub Pages subpath
        run: |
          BASE="${{ env.BASE_PATH }}"
          find web/out -type f \( -name "*.html" -o -name "*.js" -o -name "*.json" \) -print0 | while IFS= read -r -d '' f; do
            sed -i \
              -e "s|\"/_next/|\"${BASE}/_next/|g" \
              -e "s|\"/cover.|\"${BASE}/cover.|g" \
              -e "s|\"/favicon.|\"${BASE}/favicon.|g" \
              -e "s|\"/logo.|\"${BASE}/logo.|g" \
              -e "s|\"/01.|\"${BASE}/01.|g" \
              -e "s|\"/02.|\"${BASE}/02.|g" \
              -e "s|\"/03.|\"${BASE}/03.|g" \
              -e "s|\"/04.|\"${BASE}/04.|g" \
              -e "s|\"/05.|\"${BASE}/05.|g" \
              -e "s|\"/06.|\"${BASE}/06.|g" \
              -e "s|\"/07.|\"${BASE}/07.|g" \
              -e "s|\"/08.|\"${BASE}/08.|g" \
              -e "s|\"/09.|\"${BASE}/09.|g" \
              -e "s|\"/10.|\"${BASE}/10.|g" \
              "$f"
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
